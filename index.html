<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | QR code component</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* Retained minimal custom styles for the specific HSL brand colors and font family */
    body {
      font-family: 'Outfit', sans-serif;
      background-color: hsl(212, 45%, 89%);
    }
    .text-slate-900 { color: hsl(218, 44%, 22%); }
    .text-slate-500 { color: hsl(216, 15%, 48%); }
  </style>
</head>

<body class="d-flex flex-column min-vh-100">

  <!-- Main Container: Centered using Bootstrap Flex utilities -->
  <main class="flex-grow-1 d-flex justify-content-center align-items-center p-4">
    
    <!-- Bootstrap Card Component -->
    <div class="card border-0 shadow-sm rounded-4 p-3" style="max-width: 320px;">
      <img src="./images/image-qr-code.png" alt="QR Code" class="card-img-top rounded-3">
      
      <div class="card-body text-center p-0 pt-4 pb-2">
        <h1 class="card-title fw-bold fs-4 mb-3 text-slate-900">
          Improve your front-end skills by building projects
        </h1>
        <p class="card-text fs-6 px-2 text-slate-500">
          Scan the QR code to visit Frontend Mentor and take your coding skills to the next level
        </p>
      </div>
    </div>

  </main>

  <!-- Footer -->
  <footer class="text-center pb-3" style="font-size: 0.6875rem;">
    Challenge by <a href="https://frontendmentor.io" target="_blank" class="text-decoration-none">Frontend Mentor</a>.
    Coded by <a href="#" class="text-decoration-none">Carlos Rhymer</a>.
  </footer>

</body>
</html>
